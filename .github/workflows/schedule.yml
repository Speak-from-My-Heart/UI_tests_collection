name: Мониторинг ошибок (каждые 2 часа)

on:
  schedule:
    - cron: '0 */2 * * *'      # каждые 2 часа (UTC)
  workflow_dispatch:            # кнопка "Run workflow" для ручного запуска

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установка Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Кэширование pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Установка Playwright + Chromium
        run: |
          python -m playwright install-deps
          python -m playwright install chromium

      - name: Запуск мониторинга
        env:
          TG_TOKEN:          ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID:        ${{ secrets.TG_CHAT_ID }}
          ELIBRIUM_EMAIL:    ${{ secrets.ELIBRIUM_EMAIL }}
          ELIBRIUM_PASSWORD: ${{ secrets.ELIBRIUM_PASSWORD }}
          AXIONA_EMAIL:      ${{ secrets.AXIONA_EMAIL }}
          AXIONA_PASSWORD:   ${{ secrets.AXIONA_PASSWORD }}
        run: python monitor.py
