name: Запуск отчёта каждые 5 минут (тест) 6 часов теперь

on:
  schedule:
    - cron: '0 */4 * * *'          # каждые 5 минут (UTC!)
  workflow_dispatch:               # кнопка "Run workflow" для ручного запуска

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 12            # если зависнет — убьёт через 12 мин

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установка Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Кэширование pip (ускоряет повторные запуски)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Установка Playwright + Chromium
        run: |
          python -m playwright install-deps
          python -m playwright install chromium

      - name: Запуск скрипта
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python test_bad_errors.py   # ← поменяй на имя своего файла!